name: Auto PR

on:
  push:
    branches:
      - 'claude/**'

permissions:
  contents: read
  pull-requests: write

jobs:
  open-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Open PR (if no open one exists)
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          existing=$(gh pr list --head "${{ github.ref_name }}" --state open --json number --jq '.[0].number')
          if [ -n "$existing" ]; then
            echo "Open PR #$existing already exists for ${{ github.ref_name }}"
            echo "number=$existing" >> "$GITHUB_OUTPUT"
          else
            gh pr create --fill --base main --head "${{ github.ref_name }}"
            number=$(gh pr list --head "${{ github.ref_name }}" --state open --json number --jq '.[0].number')
            echo "number=$number" >> "$GITHUB_OUTPUT"
          fi

      - name: Enable auto-merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge "${{ steps.pr.outputs.number }}" --auto --squash || echo "Auto-merge not available yet (repo setting off, or PR not mergeable) — skipping."
