name: Auto PR

on:
  push:
    branches:
      - 'claude/**'

permissions:
  contents: read
  pull-requests: write

jobs:
  open-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Open PR (if none exists)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh pr view "${{ github.ref_name }}" --json number >/dev/null 2>&1; then
            echo "PR already exists for ${{ github.ref_name }}"
          else
            gh pr create --fill --base main --head "${{ github.ref_name }}"
          fi

      - name: Enable auto-merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge "${{ github.ref_name }}" --auto --squash || echo "Auto-merge not available yet (repo setting off, or PR not mergeable) — skipping."
